test:
  hostname: localhost
  remote_user: root
  deploy_path: .deploy/builds
  repository: .
  branch: main
  local: true
  shared_dirs:
    - storage/app
    - storage/framework
    - storage/logs
  shared_files:
    - .env
  writable_dirs:
    - bootstrap/cache
    - storage
    - storage/app
    - storage/framework
    - storage/logs
  keep_releases: 3
  rsync:
    - src
    - tests
    - composer.json
    - phpunit.xml
  health_checks:
    endpoints: []

local:
  hostname: localhost
  remote_user: root
  deploy_path: .deploy/builds/local
  repository: .
  branch: main
  local: true
  shared_dirs:
    - storage/app
    - storage/framework
    - storage/logs
  shared_files:
    - .env
  writable_dirs:
    - bootstrap/cache
    - storage
  keep_releases: 2
  rsync:
    - src
    - tests
    - composer.json
  health_checks:
    endpoints: []
